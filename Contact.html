<!DOCTYPE html>

    <link rel="stylesheet" href="Styles/Contact.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <title>Contact</title>
</head>
<body>
    <header>
        <h1>Contact</h1>

        <nav>
            <input type="checkbox" id="checkbox" aria-hidden="true">
            <label class="checkbtn" for="checkbox" aria-label="Open navigation menu">
                <i class='bx bx-menu'></i>
            </label>
            <ul>
                <li><a href="About_me.html">About me</a></li>
                <li><a href="Resume.html">Resume</a></li>

            </ul>
        </nav>
    </header>
    <main>
        <form action="https://formspree.io/f/mzdzvzkk" method="POST">
            <div>
                <label class="label" for="main-form-input-name">Full name</label>
                <input class="input" id="main-form-input-name" type="text" name="name" placeholder="Example: Juan Pérez" required>
            </div>
            
            <div>
                <label class="label" for="main-form-input-email">Email</label>
                <input class="input" id="main-form-input-email" type="email" name="email" placeholder="example@email.com" required>
            </div>

            <div>
                <label class="label" for="main-form-input-phone">Phone (optional)</label>
                <input class="input" id="main-form-input-phone" type="tel" name="phone" placeholder="+506 8888-8888">
            </div>

            <div>
                <label class="label" for="main-form-input-message">Message</label>
                <textarea class="input" id="main-form-input-message" name="message" rows="5" placeholder="Write your message here..." required></textarea>
            </div>
            
            <!-- Protección básica contra bots (HONEYPOT) -->
            <input type="text" name="_gotcha" style="display:none">

            <div>
                <button id="main-form-send-button" type="submit">Send</button>
                <!-- <button id="main-form-cancel-button" type="button">Cancel</button> -->
            </div>
        </form>
    </main>
